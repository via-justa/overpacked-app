services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-overpacked}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - overpacked_db_data:/var/lib/postgresql/data

  backend:
    image: ghcr.io/via-justa/overpacked-app/backend:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-overpacked}?sslmode=disable
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD: ${APP_PASSWORD:?APP_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SERVER_ADDR: ${SERVER_ADDR:-0.0.0.0:8000}
      ENABLE_SEED_DATA: ${ENABLE_SEED_DATA:-true}
      BACKUP_BASE_DIR: ${BACKUP_BASE_DIR:-/workspace/.backups}
    volumes:
      - overpacked_backups:/workspace/.backups
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    image: ghcr.io/via-justa/overpacked-app/frontend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-backend:8000}
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  overpacked_db_data:
  overpacked_backups:
