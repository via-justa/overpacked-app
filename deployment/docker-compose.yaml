version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-overpacked}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - overpacked_db_data:/var/lib/postgresql/data

  seed:
    image: ghcr.io/via-justa/overpacked-app/backend:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-overpacked}?sslmode=disable
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD: ${APP_PASSWORD:-pw123}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
    command: ["/app/api", "seed"]
    profiles:
      - seed

  backend:
    image: ghcr.io/via-justa/overpacked-app/backend:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-overpacked}?sslmode=disable
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD: ${APP_PASSWORD:-pw123}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      SERVER_ADDR: ${SERVER_ADDR:-0.0.0.0:8000}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    image: ghcr.io/via-justa/overpacked-app/frontend:latest
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-backend:8000}
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  overpacked_db_data:
