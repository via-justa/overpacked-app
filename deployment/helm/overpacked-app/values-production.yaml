nameOverride: ""
fullnameOverride: ""

cloudnativePgOperator:
  enabled: true
  config:
    clusterWide: true

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/via-justa/overpacked-app/backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  containerPort: 8000
  existingSecret: ""
  auth:
    username: admin
    password: change-me-in-production
    jwtSecret: change-me-in-production
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/via-justa/overpacked-app/frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  containerPort: 80
  backendUpstream: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

ingress:
  enabled: true
  className: ""
  annotations: {}
  hosts:
    - host: overpacked.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - overpacked.example.com
      secretName: overpacked-tls

database:
  mode: cloudnativepg
  auth:
    username: app
    password: change-me-db-password
    database: packing_light
  superuser:
    username: postgres
    password: change-me-superuser-password
  cloudnativepg:
    instances: 1
    imageName: ghcr.io/cloudnative-pg/postgresql:16
    storage:
      size: 20Gi
      storageClass: ""
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi
