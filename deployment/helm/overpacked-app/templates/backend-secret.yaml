{{- if not .Values.backend.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-backend" (include "overpacked-app.fullname" .) }}
  labels:
    {{- include "overpacked-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.backend.secretKeys.appUsername }}: {{ .Values.backend.auth.username | quote }}
  {{ .Values.backend.secretKeys.appPassword }}: {{ required "backend.auth.password is required (set it, or use backend.existingSecret)" .Values.backend.auth.password | quote }}
  {{ .Values.backend.secretKeys.jwtSecret }}: {{ required "backend.auth.jwtSecret is required (set it, or use backend.existingSecret)" .Values.backend.auth.jwtSecret | quote }}
  {{- if eq .Values.database.mode "cloudnativepg" }}
  {{- $dbPassword := required "database.auth.password is required" .Values.database.auth.password }}
  {{- $sslmode := default "require" .Values.database.cloudnativepg.sslmode }}
  {{ .Values.backend.secretKeys.databaseUrl }}: {{ printf "postgres://%s:%s@%s:5432/%s?sslmode=%s" .Values.database.auth.username $dbPassword (include "overpacked-app.db.rwService" .) .Values.database.auth.database $sslmode | quote }}
  {{- else }}
  {{ .Values.backend.secretKeys.databaseUrl }}: {{ include "overpacked-app.externalDatabaseUrl" . | quote }}
  {{- end }}
{{- end }}
