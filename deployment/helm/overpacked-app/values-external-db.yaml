nameOverride: ""
fullnameOverride: ""

cloudnativePgOperator:
  enabled: false

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/via-justa/overpacked-app/backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  containerPort: 8000
  existingSecret: ""
  auth:
    username: admin
    password: change-me-in-production
    jwtSecret: change-me-in-production
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/via-justa/overpacked-app/frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  containerPort: 80
  backendUpstream: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 300m
      memory: 256Mi
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

ingress:
  enabled: true
  className: ""
  annotations: {}
  hosts:
    - host: overpacked.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

database:
  mode: external
  external:
    host: postgres.example.com
    port: 5432
    sslmode: require
  auth:
    username: app
    password: change-me-db-password
    database: overpacked
