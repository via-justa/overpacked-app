apiVersion: v2
name: overpacked-app
description: Production-grade Helm chart for Overpacked App (frontend, backend, and CloudNativePG)
type: application
version: 0.1.0
appVersion: "0.1.0"
kubeVersion: ">=1.27.0-0"
keywords:
  - backpacking
  - inventory
  - cloudnativepg
home: https://github.com/via-justa/overpacked-app
maintainers:
  - name: overpacked-app
dependencies:
  - name: cloudnative-pg
    alias: cloudnativePgOperator
    version: 0.28.2
    repository: https://cloudnative-pg.github.io/charts
    condition: cloudnativePgOperator.enabled
