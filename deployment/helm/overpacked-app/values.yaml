# Override the short chart name used in generated resource names.
nameOverride: ""
# Override the full release-based resource prefix.
fullnameOverride: ""

serviceAccount:
  # Create a dedicated ServiceAccount for chart-managed pods.
  create: true
  # Extra annotations to attach to the ServiceAccount.
  annotations: {}
  # Provide an existing ServiceAccount name instead of creating one.
  name: ""
  # Mount the API token into pods. The app does not call the Kubernetes API,
  # so this is disabled by default (no token to steal if a pod is compromised).
  automountServiceAccountToken: false

# CloudNativePG operator dependency settings.
cloudnativePgOperator:
  # Install the CloudNativePG operator dependency with this chart.
  enabled: true
  # Values passed through to the CloudNativePG operator subchart.
  config:
    # Limit the operator to the release namespace when false.
    clusterWide: true

# Extra pod annotations applied to backend and frontend workloads.
podAnnotations: {}

backend:
  # Number of backend pods to run.
  replicaCount: 1
  image:
    # Backend image repository.
    repository: ghcr.io/via-justa/overpacked-app/backend
    # Backend image tag to deploy.
    tag: latest
    # Kubernetes image pull policy.
    pullPolicy: IfNotPresent
  service:
    # Kubernetes Service type for the backend.
    type: ClusterIP
    # Service port exposed inside the cluster.
    port: 8000
  # Container port the backend listens on.
  containerPort: 8000
  # Use an existing Secret instead of creating one from chart values.
  existingSecret: ""
  secretKeys:
    # Secret key name for the backend username.
    appUsername: APP_USERNAME
    # Secret key name for the backend password.
    appPassword: APP_PASSWORD
    # Secret key name for the JWT secret.
    jwtSecret: JWT_SECRET
    # Secret key name for the database connection string.
    databaseUrl: DATABASE_URL
  auth:
    # Backend login username.
    username: admin
    # Backend login password. Required: install fails if empty. Set via -f/--set,
    # or manage the whole Secret yourself with backend.existingSecret.
    password: ""
    # JWT signing secret used by the backend. Required: install fails if empty.
    jwtSecret: ""
  # Additional environment variables for the backend container.
  extraEnv: []
  # Seed initContainer configuration.
  seed:
    # Enable seed initContainer that applies migrations then seeds before backend starts.
    enabled: true
    # Command run by the seed initContainer. Applies migrations ("up") then seeds.
    # Both are idempotent (goose version tracking + ON CONFLICT), so it is safe to
    # run on every rollout.
    command: ["/bin/sh", "-c", "/app/api up && /app/api seed"]
  # Persistent storage for application-level backups (exposed as BACKUP_BASE_DIR).
  backup:
    # Create a PVC and mount it for server-side backups. Disabling unsets
    # BACKUP_BASE_DIR, which turns off scheduled/run-now backups.
    enabled: true
    # Mount path passed to the backend as BACKUP_BASE_DIR.
    baseDir: /data/backups
    # Size of the backup PersistentVolumeClaim.
    size: 5Gi
    # Optional storage class for the backup PVC.
    storageClass: ""
  # Pod-level security context. fsGroup makes the backup PVC writable by the
  # non-root container user.
  podSecurityContext:
    runAsNonRoot: true
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  # Container-level security context applied to the backend and seed containers.
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  resources:
    # CPU, memory, and ephemeral-storage requests/limits for the backend.
    requests:
      cpu: 50m
      memory: 64Mi
      ephemeral-storage: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
      ephemeral-storage: 512Mi
  livenessProbe:
    # HTTP path used for backend liveness checks.
    path: /health
    # Delay before liveness probes start.
    initialDelaySeconds: 10
    # How often to run liveness probes.
    periodSeconds: 10
    # Timeout for a single liveness probe.
    timeoutSeconds: 5
  readinessProbe:
    # HTTP path used for backend readiness checks.
    path: /health
    # Delay before readiness probes start.
    initialDelaySeconds: 5
    # How often to run readiness probes.
    periodSeconds: 10
    # Timeout for a single readiness probe.
    timeoutSeconds: 5
  podDisruptionBudget:
    # Keep a minimum number of backend pods available during disruptions.
    enabled: false
    # Minimum backend pods that must remain available.
    minAvailable: 1

frontend:
  # Number of frontend pods to run.
  replicaCount: 1
  image:
    # Frontend image repository.
    repository: ghcr.io/via-justa/overpacked-app/frontend
    # Frontend image tag to deploy.
    tag: latest
    # Kubernetes image pull policy.
    pullPolicy: IfNotPresent
  service:
    # Kubernetes Service type for the frontend.
    type: ClusterIP
    # Service port exposed inside the cluster.
    port: 80
  # Container port the frontend listens on.
  containerPort: 80
  # Backend upstream used by nginx when the app is deployed.
  backendUpstream: ""
  # Pod-level security context applied to the frontend pod.
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  # Container-level security context applied to the frontend container.
  # The stock nginx image starts its master as root to bind :80 and writes to
  # /var/cache/nginx and /etc/nginx/conf.d (envsubst), so runAsNonRoot and a
  # read-only root filesystem are intentionally left off here.
  securityContext:
    allowPrivilegeEscalation: false
  resources:
    # CPU, memory, and ephemeral-storage requests/limits for the frontend.
    requests:
      cpu: 25m
      memory: 32Mi
      ephemeral-storage: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
      ephemeral-storage: 128Mi

  livenessProbe:
    # HTTP path used for frontend liveness checks.
    path: /
    # Delay before liveness probes start.
    initialDelaySeconds: 10
    # How often to run liveness probes.
    periodSeconds: 10
    # Timeout for a single liveness probe.
    timeoutSeconds: 5
  readinessProbe:
    # HTTP path used for frontend readiness checks.
    path: /
    # Delay before readiness probes start.
    initialDelaySeconds: 5
    # How often to run readiness probes.
    periodSeconds: 10
    # Timeout for a single readiness probe.
    timeoutSeconds: 5
  podDisruptionBudget:
    # Keep a minimum number of frontend pods available during disruptions.
    enabled: false
    # Minimum frontend pods that must remain available.
    minAvailable: 1

ingress:
  # Enable external ingress for the frontend.
  enabled: true
  # Optional ingress class name, for example nginx or traefik.
  className: ""
  # Extra annotations for your ingress controller.
  annotations: {}
  # Host rules exposed by the ingress.
  hosts:
    - host: overpacked.local
      paths:
        # Root path routed to the frontend service.
        - path: /
          pathType: Prefix
  # TLS configuration for ingress hosts.
  tls: []

database:
  # Database mode: cloudnativepg for operator-managed PostgreSQL or external for an existing DB.
  mode: cloudnativepg
  external:
    # PostgreSQL host name or IP used only when database.mode=external.
    host: ""
    # PostgreSQL port used only when database.mode=external.
    port: 5432
    # PostgreSQL SSL mode used only when database.mode=external.
    sslmode: disable
  auth:
    # PostgreSQL application username.
    username: app
    # PostgreSQL application password. Required: install fails if empty.
    password: ""
    # PostgreSQL database name.
    database: overpacked
  superuser:
    # CloudNativePG superuser name.
    username: postgres
    # CloudNativePG superuser password. Required (cloudnativepg mode): install fails if empty.
    password: ""
  cloudnativepg:
    # Number of PostgreSQL instances managed by CloudNativePG.
    instances: 1
    # SSL mode used by the backend when connecting to the in-cluster database.
    # CloudNativePG serves TLS by default; "require" encrypts without CA verification.
    sslmode: require
    # PostgreSQL image used by the CloudNativePG cluster.
    imageName: ghcr.io/cloudnative-pg/postgresql:16
    storage:
      # Persistent volume size for the database.
      size: 1Gi
      # Optional storage class name for the database PVC.
      storageClass: ""
    resources:
      # CPU, memory, and ephemeral-storage requests/limits for PostgreSQL pods.
      requests:
        cpu: 100m
        memory: 256Mi
        ephemeral-storage: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
        ephemeral-storage: 512Mi
