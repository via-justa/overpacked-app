name: SonarQube Analysis

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  analysis:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Full history so SonarQube attributes new code and SCM blame correctly.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Installing frontend dependencies makes tsconfig.app.json's
      # "extends": "@vue/tsconfig/tsconfig.dom.json" resolvable at analysis time.
      # Without it SonarQube logs "referenced/extended tsconfig.json was not
      # found" and runs a reduced TypeScript analysis.
      - name: Install frontend dependencies
        working-directory: frontend
        # --ignore-scripts: analysis only needs node_modules present (so the
        # tsconfig "extends" resolves); we never build here, so skip dependency
        # lifecycle scripts to avoid running third-party code in CI.
        run: npm ci --ignore-scripts

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.4'
          cache-dependency-path: backend/go.sum

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # SonarQube Cloud endpoint. Change to your server URL if self-hosted.
          SONAR_HOST_URL: https://sonarcloud.io
