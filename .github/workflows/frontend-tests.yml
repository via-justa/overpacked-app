name: Frontend Tests

# Fast, blocking PR gate for the Vue frontend: type-check + unit/component tests.
# Coverage % enforcement lives in the SonarQube quality gate (see sonar.yml),
# which ingests frontend/coverage/lcov.info — so coverage is not recomputed here.
# Playwright E2E runs in its own workflow, not on every PR.

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Type-check & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type-check
        run: npm run type-check

      - name: Run tests
        run: npm run test
