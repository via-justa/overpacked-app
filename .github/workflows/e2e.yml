name: E2E (pre-release)

# Critical-path Playwright smoke against the full deployment stack. Runs only on
# pre-release (and on manual dispatch) — it is NOT a per-PR gate, to keep merges
# fast. The stack is the same one in deployment/docker-compose.yaml: an
# nginx-served frontend that proxies /api to the backend, backed by Postgres with
# seed data. Auth is single-user via APP_USERNAME / APP_PASSWORD, so those double
# as the E2E credentials — no separate user-seeding step is needed.

on:
  release:
    types: [prereleased]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  # Throwaway credentials/secrets for the ephemeral CI stack (not real secrets).
  POSTGRES_PASSWORD: e2e-postgres
  APP_USERNAME: admin
  APP_PASSWORD: e2e-app-password
  JWT_SECRET: e2e-jwt-secret
  COMPOSE_FILE: deployment/docker-compose.yaml

jobs:
  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Build the images the release will ship, tagged to match the compose file,
      # so the stack runs exactly this ref (no dependency on registry timing).
      - name: Build backend image
        run: docker build -t ghcr.io/via-justa/overpacked-app/backend:latest ./backend

      - name: Build frontend image
        run: docker build --build-arg VITE_API_BASE_URL=/api -t ghcr.io/via-justa/overpacked-app/frontend:latest ./frontend

      - name: Start the stack
        # --wait blocks until healthchecks pass (frontend depends on backend healthy,
        # backend on db healthy). ENABLE_SEED_DATA seeds the item-type/catalog tables
        # but NOT domain rows (persons/items/sets/lists) — those come from the next step.
        run: docker compose up -d --wait

      - name: Load test data
        # ENABLE_SEED_DATA does not create persons/items/sets/lists; dev/test-data.sql
        # does (idempotent, fixed UUIDs + ON CONFLICT). Mirrors the `test-data` service
        # in dev/docker-compose.yml. Runs after --wait, so migrations + seed catalog
        # are already in place, and the planner has persons/items to work with.
        run: |
          docker compose exec -T -e PGPASSWORD="${POSTGRES_PASSWORD}" db \
            psql -U postgres -d overpacked -v ON_ERROR_STOP=1 < dev/test-data.sql

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --ignore-scripts

      - name: Install Playwright browser
        working-directory: frontend
        run: ./node_modules/.bin/playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:8080
          E2E_USER: ${{ env.APP_USERNAME }}
          E2E_PASS: ${{ env.APP_PASSWORD }}
        run: npm run e2e

      - name: Dump backend logs on failure
        if: failure()
        run: docker compose logs --no-color backend

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Tear down the stack
        if: always()
        run: docker compose down -v
