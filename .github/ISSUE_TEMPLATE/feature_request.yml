name: Feature request
description: Suggest an idea or improvement
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: As a user, I want ... because ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the solution you want.
      placeholder: The app should ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered.

  - type: dropdown
    id: impact
    attributes:
      label: Expected impact
      options:
        - Small quality-of-life improvement
        - Moderate feature improvement
        - Major feature / workflow change
    validations:
      required: true

  - type: checkboxes
    id: scope
    attributes:
      label: Possible scope
      options:
        - label: Frontend UI/UX
        - label: Backend API
        - label: Database model/migrations
        - label: Documentation

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, mockups, examples, or related issues.
