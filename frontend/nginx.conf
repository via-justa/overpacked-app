server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers (defense-in-depth). The CSP assumes the SPA loads its own
  # bundled JS/CSS, renders item images as data: URIs, and talks to the backend
  # on the same origin (via the /api proxy). Tighten/loosen if asset origins
  # change. 'unsafe-inline' for styles is required by the component library.
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

  # Proxy API requests to the internal backend service.
  location /api/ {
    proxy_pass http://${BACKEND_UPSTREAM};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback to index.html for client-side routing.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
