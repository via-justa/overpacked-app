sonar.projectKey=via-justa_overpacked-app
# SonarQube Cloud organization key — verify under your SonarQube org settings.
# Remove this line if you analyze against a self-hosted SonarQube Server.
sonar.organization=via-justa

# Exclude from ALL analysis — none of this is hand-maintained application source:
#   - schema.ts / api.gen.go: generated from dev/openapi.yaml (openapi-typescript / oapi-codegen)
#   - *.sql: PostgreSQL migrations + seed data. SonarQube's PL/SQL analyzer targets
#     Oracle, so it raises a "Data Dictionary not configured" warning and irrelevant
#     rules on these; the dialect doesn't apply, so don't analyze SQL at all.
#   - .claude/: Claude Code agent skills and tooling scripts, not product code
sonar.exclusions=frontend/src/lib/api/schema.ts,backend/internal/api/api.gen.go,**/*.sql,.claude/**

# Test code is still analyzed for bugs/vulnerabilities, but its table-driven
# setup is inherently repetitive, so exclude tests from copy/paste detection.
sonar.cpd.exclusions=**/*_test.go

# Go coverage profile produced by the CI test step / `make test-backend-container`.
# Path is repo-root-relative; the tests run in backend/, so it lands here.
sonar.go.coverage.reportPaths=backend/coverage.out

# JS/TS (Vitest v8) coverage produced by `npm run coverage` in the CI frontend
# step. Path is repo-root-relative; tests run in frontend/, so it lands here.
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Scope the coverage METRIC to the code the current unit-test rollout targets,
# mirroring Vitest's coverage.include (frontend/vitest.config.ts). The frontend
# is graded phase by phase: lib utilities, feature utils/schemas and top-level
# composables/stores are unit-tested, but Vue components/views and feature-local
# composables are not yet (they're exercised by Playwright E2E), so excluding
# them keeps the new-code coverage gate meaningful instead of diluting it with
# hundreds of as-yet-untested lines. Widen this as each phase's tests land.
# Test scaffolding, E2E specs, build/test config and generated/bootstrap code
# are kept out too. All of these files are still analyzed for bugs/smells.
# Also kept out (declarative glue with no behaviour to unit-test): lint/build
# scripts, the thin per-feature API client wrappers (pure pass-through to
# openapi-fetch, like the feature composables above), the static icon registry,
# router wiring, and data/type-only modules.
sonar.coverage.exclusions=frontend/src/test/**,frontend/**/*.test.ts,frontend/src/main.ts,frontend/src/**/*.vue,frontend/src/features/**/composables/**,frontend/e2e/**,frontend/*.config.ts,backend/cmd/**,backend/internal/api/api.gen.go,backend/internal/migrations/**,backend/internal/seeds/**,**/*_test.go,frontend/scripts/**,frontend/src/features/**/api/*Api.ts,frontend/src/lib/icons/**,frontend/src/router/**,frontend/src/components/actions/actionOptions.ts,frontend/src/features/trips/plannerTypes.ts
