sonar.projectKey=via-justa_overpacked-app
# SonarQube Cloud organization key — verify under your SonarQube org settings.
# Remove this line if you analyze against a self-hosted SonarQube Server.
sonar.organization=via-justa

# Exclude from copy/paste (duplication) detection:
#   - schema.ts / api.gen.go: generated from dev/openapi.yaml (openapi-typescript / oapi-codegen)
#   - test-data.sql: repetitive dev seed data
#   - *_test.go: table-driven test setup is inherently repetitive
sonar.cpd.exclusions=frontend/src/lib/api/schema.ts,backend/internal/api/api.gen.go,dev/test-data.sql,**/*_test.go
