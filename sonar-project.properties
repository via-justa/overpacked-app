sonar.projectKey=via-justa_overpacked-app
# SonarQube Cloud organization key — verify under your SonarQube org settings.
# Remove this line if you analyze against a self-hosted SonarQube Server.
sonar.organization=via-justa

# Exclude from ALL analysis — none of this is hand-maintained application source:
#   - schema.ts / api.gen.go: generated from dev/openapi.yaml (openapi-typescript / oapi-codegen)
#   - *.sql: PostgreSQL migrations + seed data. SonarQube's PL/SQL analyzer targets
#     Oracle, so it raises a "Data Dictionary not configured" warning and irrelevant
#     rules on these; the dialect doesn't apply, so don't analyze SQL at all.
#   - .claude/: Claude Code agent skills and tooling scripts, not product code
sonar.exclusions=frontend/src/lib/api/schema.ts,backend/internal/api/api.gen.go,**/*.sql,.claude/**

# Test code is still analyzed for bugs/vulnerabilities, but its table-driven
# setup is inherently repetitive, so exclude tests from copy/paste detection.
sonar.cpd.exclusions=**/*_test.go

# Go coverage profile produced by the CI test step / `make test-backend-container`.
# Path is repo-root-relative; the tests run in backend/, so it lands here.
sonar.go.coverage.reportPaths=backend/coverage.out

# JS/TS (Vitest v8) coverage produced by `npm run coverage` in the CI frontend
# step. Path is repo-root-relative; tests run in frontend/, so it lands here.
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Scope the coverage METRIC to application code. Frontend is now covered by
# Vitest, so it is graded — but keep test scaffolding and generated/bootstrap
# code out of the metric. These files are still analyzed for bugs/smells.
sonar.coverage.exclusions=frontend/src/test/**,frontend/**/*.test.ts,frontend/src/main.ts,backend/cmd/**,backend/internal/api/api.gen.go,backend/internal/migrations/**,backend/internal/seeds/**,**/*_test.go
