          type: integer
        weight_unit:
          type: string
          enum: [g, oz]
        distance_unit:
          type: string
          enum: [km, mi]
        temperature_unit:
          type: string
          enum: [c, f]
        volume_unit:
          type: string
          enum: [ml, fl_oz]
        currency:
          type: string
          enum: [usd, eur]

    SettingsUpdate:
      type: object
      properties:
        weight_unit:
          type: string
          enum: [g, oz]
        distance_unit:
          type: string
          enum: [km, mi]
        temperature_unit:
          type: string
          enum: [c, f]
        volume_unit:
          type: string
          enum: [ml, fl_oz]
        currency:
