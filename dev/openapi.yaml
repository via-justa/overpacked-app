openapi: 3.0.3
info:
  title: Packing List API
  version: 0.1.0
  description: Backpacking gear management API
servers:
  - url: http://localhost:8000

paths:
  /health:
    get:
      tags:
        - health
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            text/plain:
              schema:
                type: string

  /api/v1/auth/login:
    post:
      tags:
        - auth
      summary: Login with app credentials
      description: >-
        On success the access token is returned in the body and the refresh
        token is set in an HttpOnly `op_refresh` cookie (never exposed to
        JavaScript).
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          headers:
            Set-Cookie:
              description: HttpOnly refresh token cookie (`op_refresh`).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/refresh:
    post:
      tags:
        - auth
      summary: Refresh JWT tokens
      description: >-
        Rotates the session using the refresh token in the HttpOnly
        `op_refresh` cookie set at login. Takes no request body; a fresh access
        token is returned in the body and a rotated refresh cookie is set.
      operationId: authRefresh
      responses:
        '200':
          description: Tokens refreshed
          headers:
            Set-Cookie:
              description: Rotated HttpOnly refresh token cookie (`op_refresh`).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/logout:
    post:
      tags:
        - auth
      summary: Logout current session
      operationId: authLogout
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logged out successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/settings:
    get:
      tags:
        - settings
      summary: Get current settings
      operationId: getSettings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Settings retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      tags:
        - settings
      summary: Update settings
      operationId: updateSettings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsUpdate'
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
