        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/backup/export:
    get:
      tags:
        - backup
      summary: Download a full backup archive
      operationId: exportBackup
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Backup archive
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/backup/import:
    post:
      tags:
        - backup
      summary: Restore data from a backup archive
      operationId: importBackup
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - mode
                - password
              properties:
                file:
                  type: string
                  format: binary
                mode:
                  type: string
                  enum: [replace, merge]
                password:
                  type: string
      responses:
        '200':
          description: Import completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupImportResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

