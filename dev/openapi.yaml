  /api/v1/search:
    get:
      tags:
        - search
      summary: Global fuzzy search across entities
      operationId: searchGlobal
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (minimum 2 characters)
          schema:
            type: string
            minLength: 2
        - name: types
          in: query
          required: false
          description: Restrict results to the given entity types. Repeat the parameter to request multiple types.
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/SearchEntityType'
        - name: limit
          in: query
          required: false
          description: Maximum number of results to return
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
