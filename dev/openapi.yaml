  /api/v1/packing-lists/{listId}/labels/{labelId}:
    delete:
      tags:
        - packing-list-labels
      summary: Remove label from packing list
      operationId: removePackingListLabel
      security:
        - bearerAuth: []
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: labelId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Label removed from packing list
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

